<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OWCS Korea 2026 Current Dashboard</title>
  <style>
    :root {
      --bg: #08111a;
      --panel: #0f1b28;
      --panel-2: #132335;
      --panel-3: #172a40;
      --line: #223852;
      --text: #eef4fb;
      --muted: #9cb0c4;
      --accent: #8db9ff;
      --good: #9ff7b3;
      --warn: #ffd37b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #06101a 0%, #0b1622 100%);
      color: var(--text);
    }
    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 16px 36px rgba(0,0,0,0.25);
    }
    .hero {
      padding: 24px 28px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, rgba(141,185,255,0.15), rgba(15,27,40,0.95));
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 800;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }
    .controls {
      display: grid;
      grid-template-columns: 170px 170px 150px 1fr 150px;
      gap: 12px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .graph-controls {
      display: grid;
      grid-template-columns: 180px 180px 180px;
      gap: 12px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    select, input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }
    .section-title {
      margin: 0 0 12px;
      font-size: 20px;
      font-weight: 800;
    }
    .table-panel { overflow: hidden; margin-bottom: 18px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead th {
      padding: 14px 12px;
      text-align: left;
      color: #b8cae0;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    tbody td {
      padding: 13px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      white-space: nowrap;
    }
    tbody tr:hover { background: rgba(141,185,255,0.06); }
    .rank { font-weight: 800; color: var(--accent); }
    .muted { color: var(--muted); }
    .player-panel {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .player-side, .player-main, .graph-panel, .role-board-wrap { padding: 18px; }
    .player-picker { margin-bottom: 16px; }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .pill {
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--panel-3);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .player-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .stat-card {
      position: relative;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      min-height: 108px;
    }
    .stat-card h4 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .stat-card .sub {
      color: var(--muted);
      font-size: 13px;
    }
    .rank-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(141,185,255,0.16);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
    }
    .role-board-wrap { margin-bottom: 18px; }
    .role-board-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .role-board {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .role-board h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .board-block { margin-bottom: 14px; }
    .board-block:last-child { margin-bottom: 0; }
    .board-block h4 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .leader-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }
    .leader-row:last-child { border-bottom: 0; }
    .graph-panel { margin-bottom: 18px; }
    .graph-shell {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      overflow-x: auto;
    }
    svg { width: 100%; height: 520px; display: block; }
    .graph-note {
      color: var(--muted);
      font-size: 13px;
      margin: 10px 0 0;
    }
    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 1100px) {
      .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .player-panel { grid-template-columns: 1fr; }
      .role-board-grid { grid-template-columns: 1fr; }
      .graph-controls { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .page { padding: 14px; }
      .controls { grid-template-columns: 1fr; }
      .player-grid { grid-template-columns: 1fr; }
      thead th, tbody td { padding: 10px 8px; font-size: 12px; }
      .hero h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>OWCS Korea 2026 Player Stats Review</h1>
      <p>선수 스탯 리뷰 전용 대시보드입니다. 선택한 기간 범위의 데이터를 합산해 표와 선수 상세, 역할별 리더보드, 기간별 그래프를 확인할 수 있습니다.</p>
    </section>

    <section class="panel controls">
      <div>
        <label for="startPeriod">Start Period</label>
        <select id="startPeriod"></select>
      </div>
      <div>
        <label for="endPeriod">End Period</label>
        <select id="endPeriod"></select>
      </div>
      <div>
        <label for="roleFilter">Role</label>
        <select id="roleFilter">
          <option value="ALL">All Roles</option>
          <option value="DPS">DPS</option>
          <option value="Tank">Tank</option>
          <option value="Support">Support</option>
        </select>
      </div>
      <div>
        <label for="search">Search</label>
        <input id="search" type="text" placeholder="Search player or team" />
      </div>
      <div>
        <label for="minMinutes">Min Minutes</label>
        <input id="minMinutes" type="number" min="0" step="1" value="0" />
      </div>
    </section>

    <section class="panel table-panel">
      <table>
        <thead>
          <tr>
            <th data-sort="Rank">Rank</th>
            <th data-sort="Team">Team</th>
            <th data-sort="Player">Player</th>
            <th data-sort="Role">Role</th>
            <th data-sort="E/10">킬</th>
            <th data-sort="A/10">어시</th>
            <th data-sort="D/10">데스</th>
            <th data-sort="E/D">목숨당 처치</th>
            <th data-sort="DMG/10">딜</th>
            <th data-sort="H/10">힐</th>
            <th data-sort="MIT/10">경감</th>
            <th data-sort="Appearances">출전 경기</th>
            <th data-sort="Minutes">출전 시간</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty" class="empty" hidden>선택한 조건에 맞는 선수가 없습니다.</div>
    </section>

    <section class="panel player-panel">
      <div class="player-side">
        <h2 class="section-title">Player Detail</h2>
        <div class="player-picker">
          <label for="selectedPlayer">Player</label>
          <select id="selectedPlayer"></select>
        </div>
        <div id="playerMeta"></div>
      </div>
      <div class="player-main">
        <div id="playerCards" class="player-grid"></div>
      </div>
    </section>

    <section class="panel role-board-wrap">
      <h2 class="section-title">역할별 리더보드</h2>
      <div id="roleBoards" class="role-board-grid"></div>
    </section>

    <section class="panel graph-panel">
      <h2 class="section-title">기간별 추이 그래프</h2>
      <div class="graph-controls">
        <div>
          <label for="graphRole">Graph Role</label>
          <select id="graphRole">
            <option value="DPS">DPS</option>
            <option value="Tank">Tank</option>
            <option value="Support">Support</option>
          </select>
        </div>
        <div>
          <label for="graphMetric">Graph Metric</label>
          <select id="graphMetric">
            <option value="E/10">킬</option>
            <option value="A/10">어시</option>
            <option value="D/10">데스</option>
            <option value="E/D">목숨당 처치</option>
            <option value="DMG/10">딜</option>
            <option value="H/10">힐</option>
            <option value="MIT/10">경감</option>
          </select>
        </div>
        <div>
          <label for="graphMinAppearances">출전 경기 최소</label>
          <input id="graphMinAppearances" type="number" min="1" step="1" value="1" />
        </div>
      </div>
      <div class="graph-shell">
        <div id="graph"></div>
      </div>
      <p class="graph-note">그래프는 선택한 역할에서 1회 이상 출전한 모든 선수를 대상으로 하며, 팀별 색상으로 구분됩니다.</p>
    </section>
  </div>

    const $ = (id) => document.getElementById(id);
    const fmt = (n) => Number.isFinite(n) ? n.toFixed(2) : "0.00";

    function rangePeriods() {
      const s = PERIODS.indexOf(state.start);
      const e = PERIODS.indexOf(state.end);
      if (s === -1 || e === -1) return [PERIODS[0]];
      const from = Math.min(s, e);
      const to = Math.max(s, e);
      return PERIODS.slice(from, to + 1);
    }

    function canonicalPlayerName(team, player) {
      const key = `${String(team || "").toLowerCase()}||${String(player || "").toLowerCase()}`;
      return PLAYER_CANONICAL[key] || player;
    }

    function normalizeRow(row) {
      const e = Number(row.E || 0);
      const a = Number(row.A || 0);
      const d = Number(row.D || 0);
      const dmg = Number(row.DMG || 0);
      const h = Number(row.H || 0);
      const mit = Number(row.MIT || 0);
      const minutes = Number(row.Minutes || 0);
      const team = row.Team;
      const player = canonicalPlayerName(team, row.Player);
      return {
        Team: team,
        Player: player,
        Role: row.Role,
        Appearances: Number(row.Appearances || 0),
        Minutes: minutes,
        E: e,
        A: a,
        D: d,
        DMG: dmg,
        H: h,
        MIT: mit,
        "E/10": minutes > 0 ? (e * 10) / minutes : 0,
        "A/10": minutes > 0 ? (a * 10) / minutes : 0,
        "D/10": minutes > 0 ? (d * 10) / minutes : 0,
        "E/D": e / (d + 1),
        "DMG/10": minutes > 0 ? (dmg * 10) / minutes : 0,
        "H/10": minutes > 0 ? (h * 10) / minutes : 0,
        "MIT/10": minutes > 0 ? (mit * 10) / minutes : 0
      };
    }

    function aggregate(periods = rangePeriods()) {
      const map = new Map();
      for (const period of periods) {
        for (const row of PERIOD_ROWS[period] || []) {
          const canonicalPlayer = canonicalPlayerName(row.Team, row.Player);
          const key = `${row.Team}||${canonicalPlayer}||${row.Role}`;
          if (!map.has(key)) {
            map.set(key, { Team: row.Team, Player: canonicalPlayer, Role: row.Role, Appearances: 0, Minutes: 0, E: 0, A: 0, D: 0, DMG: 0, H: 0, MIT: 0 });
          }
          const entry = map.get(key);
          entry.Appearances += Number(row.Appearances || 0);
          entry.Minutes += Number(row.Minutes || 0);
          entry.E += Number(row.E || 0);
          entry.A += Number(row.A || 0);
          entry.D += Number(row.D || 0);
          entry.DMG += Number(row.DMG || 0);
          entry.H += Number(row.H || 0);
          entry.MIT += Number(row.MIT || 0);
        }
      }
      return Array.from(map.values()).map(normalizeRow);
    }

    function sortRows(list) {
      const metric = state.sort;
      const direction = state.dir === "asc" ? 1 : -1;
      return [...list].sort((a, b) => {
        let av = a[metric];
        let bv = b[metric];
        if (["Team", "Player", "Role"].includes(metric)) {
          av = String(av);
          bv = String(bv);
          return av.localeCompare(bv) * direction;
        }
        if (metric === "Rank") return 0;
        return ((av ?? 0) - (bv ?? 0)) * direction;
      });
    }

    function rows() {
      let list = aggregate();
      if (state.role !== "ALL") list = list.filter((r) => r.Role === state.role);
      if (state.search.trim()) {
        const q = state.search.trim().toLowerCase();
        list = list.filter((r) => r.Player.toLowerCase().includes(q) || r.Team.toLowerCase().includes(q));
      }
      list = list.filter((r) => r.Minutes >= state.min);
      list = sortRows(list);
      return list.map((row, idx) => ({ ...row, Rank: idx + 1 }));
    }

    function metricRankingPool(list, metric) {
      const base = [...list];
      const asc = metric === "D/10";
      base.sort((a, b) => asc ? (a[metric] - b[metric]) : (b[metric] - a[metric]));
      return base;
    }

    function rankForMetric(metric, row, list) {
      const pool = metricRankingPool(list, metric);
      const found = pool.findIndex((item) => item.Team === row.Team && item.Player === row.Player && item.Role === row.Role);
      return found === -1 ? "-" : found + 1;
    }

          ${ROLE_BOARD_METRICS[role].map((metric) => `
            <div class="board-block">
              <h4>${METRIC_LABELS[metric]}</h4>
              ${roleBoardRows(role, metric).map((row, idx) => `
                <div class="leader-row">
                  <div class="rank">${idx + 1}</div>
                  <div>${row.Player} <span class="muted">(${row.Team})</span></div>
                  <div>${fmt(row[metric])}</div>
                </div>`).join("") || '<div class="muted">데이터 없음</div>'}
            </div>`).join("")}
        </section>`).join("");
    }

    function renderGraph() {
      const periods = rangePeriods();
      const role = state.graphRole;
      const metric = state.graphMetric;
      const minApps = Math.max(1, Number(state.graphMinApps || 1));
      const aggregated = aggregate(periods).filter((r) => r.Role === role && r.Appearances >= minApps);
      const players = aggregated.sort((a, b) => b[metric] - a[metric]);
      if (!players.length) {
        $("graph").innerHTML = '<div class="empty">선택한 그래프 조건에 맞는 선수가 없습니다.</div>';
        return;
      }
      const periodData = new Map();
      for (const period of periods) {
        const rows = (PERIOD_ROWS[period] || []).map(normalizeRow);
        periodData.set(period, rows.filter((r) => r.Role === role));
      }
      const series = players.map((player) => {
        const values = periods.map((period) => {
          const row = (periodData.get(period) || []).find((r) => r.Team === player.Team && r.Player === player.Player && r.Role === player.Role);
          return row ? row[metric] : null;
        });
        return { ...player, values };
      });
      const numericValues = series.flatMap((s) => s.values.filter((v) => v !== null));
      const max = Math.max(...numericValues, 1);
      const min = Math.min(...numericValues, 0);
      const width = Math.max(820, periods.length * 220);
      const height = 520;
      const margin = { top: 20, right: 30, bottom: 70, left: 70 };
      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;
      const x = (idx) => margin.left + (periods.length === 1 ? innerW / 2 : (idx * innerW) / (periods.length - 1));
      const y = (value) => {
        if (max === min) return margin.top + innerH / 2;
        return margin.top + innerH - ((value - min) / (max - min)) * innerH;
      };
      const yTicks = 5;
      let svg = `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${role} ${metric} trend chart">`;
      for (let i = 0; i <= yTicks; i++) {
        const value = min + ((max - min) * i) / yTicks;
        const yy = margin.top + innerH - (innerH * i) / yTicks;
        svg += `<line x1="${margin.left}" y1="${yy}" x2="${width - margin.right}" y2="${yy}" stroke="#223852" stroke-width="1" />`;
        svg += `<text x="${margin.left - 10}" y="${yy + 4}" fill="#9cb0c4" font-size="12" text-anchor="end">${fmt(value)}</text>`;
      }
      periods.forEach((period, idx) => {
        const xx = x(idx);
        svg += `<line x1="${xx}" y1="${margin.top}" x2="${xx}" y2="${margin.top + innerH}" stroke="rgba(255,255,255,0.05)" stroke-width="1" />`;
        svg += `<text x="${xx}" y="${height - 24}" fill="#9cb0c4" font-size="12" text-anchor="middle">${period}</text>`;
      });
      series.forEach((s) => {
        const color = TEAM_COLORS[s.Team] || '#8db9ff';
        const points = s.values.map((v, idx) => v === null ? null : `${x(idx)},${y(v)}`).filter(Boolean);
        if (points.length >= 2) {
          svg += `<polyline fill="none" stroke="${color}" stroke-width="2.4" points="${points.join(' ')}"><title>${s.Player} (${s.Team})</title></polyline>`;
        }
        s.values.forEach((v, idx) => {
          if (v === null) return;
          svg += `<circle cx="${x(idx)}" cy="${y(v)}" r="4.5" fill="${color}" stroke="#08111a" stroke-width="1.5"><title>${s.Player} | ${s.Team} | ${periods[idx]} | ${METRIC_LABELS[metric]} ${fmt(v)}</title></circle>`;
        });
      });
      svg += `</svg>`;
      $("graph").innerHTML = svg;
    }

    function render() {
      const list = rows();
      renderTable(list);
      renderPlayer(list);
      renderRoleBoards();
      renderGraph();
    }

    function bind() {
      const start = $("startPeriod");
      const end = $("endPeriod");
      start.innerHTML = PERIODS.map((p) => `<option value="${p}">${p}</option>`).join("");
      end.innerHTML = PERIODS.map((p) => `<option value="${p}">${p}</option>`).join("");
      start.value = state.start;
      end.value = state.end;
      start.addEventListener('change', (e) => { state.start = e.target.value; render(); });
      end.addEventListener('change', (e) => { state.end = e.target.value; render(); });
      $("roleFilter").addEventListener('change', (e) => { state.role = e.target.value; render(); });
      $("search").addEventListener('input', (e) => { state.search = e.target.value; render(); });
      $("minMinutes").addEventListener('input', (e) => { state.min = Number(e.target.value || 0); render(); });
      $("selectedPlayer").addEventListener('change', (e) => { state.selected = e.target.value; render(); });
      $("graphRole").addEventListener('change', (e) => { state.graphRole = e.target.value; renderGraph(); });
      $("graphMetric").addEventListener('change', (e) => { state.graphMetric = e.target.value; renderGraph(); });
      $("graphMinAppearances").addEventListener('input', (e) => { state.graphMinApps = Number(e.target.value || 1); renderGraph(); });
      document.querySelectorAll('thead th[data-sort]').forEach((th) => {
        th.addEventListener('click', () => {
          const key = th.dataset.sort;
          if (state.sort === key) {
            state.dir = state.dir === 'asc' ? 'desc' : 'asc';
          } else {
            state.sort = key;
            state.dir = ['D/10'].includes(key) ? 'asc' : 'desc';
          }
          render();
        });
      });
    }

    bind();
    render();
  </script>
</body>
</html>
